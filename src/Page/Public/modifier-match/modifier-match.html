<app-icon></app-icon>

<!-- ====================================================== -->
<!-- PAGE MODIFIER MATCH -->
<!-- ====================================================== -->

<section
  class="relative w-full min-h-screen overflow-hidden flex flex-col lg:flex-row"
  [ngStyle]="{ 'background': themeService.Backgroundprincipal }">

  <!-- BACKGROUND -->
  <div
    class="absolute inset-0 opacity-20 pointer-events-none"
    style="
      background:
      radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 30%);
    ">
  </div>

  <!-- LEFT -->
  <div class="relative hidden lg:flex lg:w-1/2 min-h-screen overflow-hidden">

    <img
      src="assets/imagefonctionalite.jpg"
      class="absolute inset-0 w-full h-full object-cover transition-transform duration-[12s] hover:scale-110"
    />

    <div
      class="absolute inset-0"
      [ngStyle]="{
        'background':
        'linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.70))'
      }">
    </div>

    <div class="relative z-10 flex flex-col justify-between h-full w-full p-10">

      <div class="flex items-center gap-4">

        <div class="w-16 h-16 rounded-3xl flex items-center justify-center backdrop-blur-xl border shadow-xl"
          [ngStyle]="{
            'background': 'rgba(255,255,255,0.12)',
            'border-color': 'rgba(255,255,255,0.20)'
          }">

          <i class="fa-solid fa-futbol text-white text-2xl"></i>

        </div>

        <div>
          <h1 class="text-2xl font-black text-white">ASDAM</h1>
          <p class="text-xs uppercase tracking-[4px] text-white/60">
            Gestion des matchs
          </p>
        </div>

      </div>

      <div class="max-w-[420px]">
        <h2 class="text-5xl font-black text-white mb-6">
          Modifier <br> un match
        </h2>

        <p class="text-white/70">
          Gérez les scores et informations des matchs en toute simplicité.
        </p>
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="relative flex-1 min-h-screen flex items-center justify-center px-5 py-8 lg:px-16">

    <div class="w-full max-w-2xl">

      <!-- HEADER -->
      <div class="flex items-center justify-between mb-10">

        <div>
          <div class="flex items-center gap-3 mb-2">
            <div class="w-1 h-10 rounded-full"
              [ngStyle]="{ 'background': themeService.primary }"></div>

            <h2 class="text-4xl font-black"
              [ngStyle]="{ 'color': themeService.Textprincipal }">
              Modifier match
            </h2>
          </div>

          <p class="text-sm ml-4"
            [ngStyle]="{ 'color': themeService.Textsecondaire }">
            Mettre à jour les informations du match
          </p>
        </div>

        <button
          (click)="goBack()"
          class="h-12 px-5 rounded-2xl font-bold flex items-center gap-2"
          [ngStyle]="{
            'background': themeService.Background2,
            'color': themeService.Textprincipal,
            'border': '1px solid ' + themeService.GlassBorder
          }">

          <i class="fa-solid fa-arrow-left"></i>
          Retour
        </button>

      </div>

      <!-- FORM -->
      <form (ngSubmit)="updateMatch()" class="space-y-7">

        <input
          [(ngModel)]="match.equipeDomicile"
          name="equipe1"
          placeholder="Équipe 1"
          class="w-full h-16 px-5 rounded-3xl outline-none"
          [ngStyle]="{
            'background': themeService.Background1,
            'color': themeService.Textprincipal
          }"
        />

        <input
          [(ngModel)]="match.equipeExterieur"
          name="equipe2"
          placeholder="Équipe 2"
          class="w-full h-16 px-5 rounded-3xl outline-none"
          [ngStyle]="{
            'background': themeService.Background1,
            'color': themeService.Textprincipal
          }"
        />

        <div class="grid grid-cols-2 gap-4">

          <input
            type="number"
            [(ngModel)]="match.scoreDomicile"
            name="score1"
            placeholder="Score équipe 1"
            class="h-16 px-5 rounded-3xl outline-none"
            [ngStyle]="{
              'background': themeService.Background1,
              'color': themeService.Textprincipal
            }"
          />

          <input
            type="number"
            [(ngModel)]="match.scoreExterieur"
            name="score2"
            placeholder="Score équipe 2"
            class="h-16 px-5 rounded-3xl outline-none"
            [ngStyle]="{
              'background': themeService.Background1,
              'color': themeService.Textprincipal
            }"
          />

        </div>

        <input
          type="date"
          [(ngModel)]="match.dateMatch"
          name="date"
          class="w-full h-16 px-5 rounded-3xl outline-none"
          [ngStyle]="{
            'background': themeService.Background1,
            'color': themeService.Textprincipal
          }"
        />

        <input
          [(ngModel)]="match.stade"
          name="lieu"
          placeholder="Lieu"
          class="w-full h-16 px-5 rounded-3xl outline-none"
          [ngStyle]="{
            'background': themeService.Background1,
            'color': themeService.Textprincipal
          }"
        />

        <button
          type="submit"
          class="w-full h-16 rounded-3xl font-black text-white"
          [ngStyle]="{ 'background': themeService.primary }">

          <i class="fa-solid fa-floppy-disk mr-2"></i>
          Enregistrer
        </button>

      </form>

    </div>
  </div>

</section>

<!-- ====================================================== -->
<!-- 🔔 TOAST NOTIFICATION -->
<!-- ====================================================== -->

<div *ngIf="showNotification"
  class="fixed top-5 left-1/2 -translate-x-1/2 z-[999999] animate-toast">

  <div
    [ngStyle]="{
      'background':
        'linear-gradient(135deg,' +
        themeService.c18Base + ',' +
        themeService.c18Base + ')'
    }"
    class="relative flex items-center gap-4 px-6 py-4 rounded-3xl text-white shadow-2xl backdrop-blur-xl border border-white/10 min-w-[320px] max-w-[90vw]">

    <!-- ICON -->
    <div
      class="w-11 h-11 rounded-2xl flex items-center justify-center bg-white/15">

      <i class="fa-solid fa-circle-check text-lg"></i>

    </div>

    <!-- TEXT -->
    <div class="flex-1">

      <p class="font-black text-sm tracking-wide">
        Notification
      </p>

      <p class="text-sm opacity-90">
        {{ notificationMessage }}
      </p>

    </div>

    <!-- CLOSE -->
    <button
      (click)="closeNotification()"
      class="w-8 h-8 rounded-full hover:bg-white/10 transition-all duration-300">

      <i class="fa-solid fa-xmark"></i>

    </button>

    <!-- SHINE -->
    <div
      class="absolute inset-0 rounded-3xl overflow-hidden pointer-events-none">

      <div
        class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-shine">
      </div>

    </div>

  </div>

</div>
