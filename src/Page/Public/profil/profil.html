<app-mobile></app-mobile>

<!-- ================= LOADER ================= -->
<div *ngIf="!isLoaded"
     class="fixed inset-0 flex items-center justify-center z-[2] bg-black/60 backdrop-blur-sm transition-all duration-300">
  <div class="animate-pulse text-lg font-bold text-white tracking-wider">
    Chargement...
  </div>
</div>


<!-- ================= PAGE mobile ================= -->
<div [ngStyle]="{'background':themeService.Backgroundprincipaltest}" class="actus-container min-h-screen transition-colors duration-500 relative">


  <!-- Contenu principal (TOUJOURS AU-DESSUS) -->
  <div class="relative z-[10] min-h-screen">
    <app-header></app-header>
    <app-user-profil></app-user-profil>        
    <app-footer></app-footer>
  </div>

</div>

<style>
/* Animation subtile pour la grille */
@keyframes gridPulse {
  0%, 100% { opacity: 0.05; }
  50% { opacity: 0.12; }
}

html {
  scroll-behavior: smooth;
}

/* Assure que le conteneur prend bien toute la hauteur */
.actus-container {
  display: flex;
  flex-direction: column;
}
</style>
