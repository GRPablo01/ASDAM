<!-- ========================================================= -->
<!-- ⚽ ASDAM - COOKIE BANNER PREMIUM UI/UX -->
<!-- ========================================================= -->

<!-- ============================= -->
<!-- OVERLAY -->
<!-- ============================= -->
<div *ngIf="show" class="fixed inset-0 z-[2147483646] transition-all duration-500" [ngStyle]="{
    'background': themeService.isDarkMode
      ? 'rgba(3,7,18,0.82)'
      : 'rgba(15,23,42,0.35)',
    'backdrop-filter': 'blur(10px)',
    '-webkit-backdrop-filter': 'blur(10px)'
  }">
</div>

<!-- ============================= -->
<!-- COOKIE BANNER -->
<!-- ============================= -->
<div *ngIf="show" role="dialog" aria-modal="true" aria-labelledby="cookie-title" aria-describedby="cookie-desc" class="fixed bottom-0 left-0 right-0 z-[2147483647]
         px-3 sm:px-5 pb-4 sm:pb-6
         animate-cookie-up">

  <div [ngStyle]="{
      'background':
        'linear-gradient(135deg,' +
        themeService.GlassBackground + ',' +
        themeService.Background1 + ')',

      'border':
        '1px solid ' + themeService.GlassBorder,

      'box-shadow':
        themeService.GlassShadow,

      'color':
        themeService.Textprincipal
    }" class="
      relative
      overflow-hidden

      max-w-5xl
      mx-auto

      rounded-[32px]

      p-5
      sm:p-7

      backdrop-blur-2xl
      border

      transition-all
      duration-500

      flex
      flex-col
      xl:flex-row

      items-start
      xl:items-center

      justify-between

      gap-7
    ">

   

    <!-- ====================================== -->
    <!-- LEFT CONTENT -->
    <!-- ====================================== -->

    <div class="relative z-10 flex items-start gap-5 flex-1 w-full">

      <!-- ======================== -->
      <!-- LOGO -->
      <!-- ======================== -->
      <div class="
          relative
          shrink-0
          group
        ">

        <div [ngStyle]="{
            'background':themeService.primary
          }" class="
            relative
            w-16
            h-16

            rounded-2xl

            flex
            items-center
            justify-center

            shadow-2xl

            group-hover:scale-110
            transition-all
            duration-500
          ">

          <img src="assets/LOGO.png" alt="AS DAM Logo" class="w-14 h-14 object-contain select-none" draggable="false"
            loading="lazy" />

        </div>
      </div>

      <!-- ======================== -->
      <!-- TEXT CONTENT -->
      <!-- ======================== -->

      <div class="flex-1 min-w-0">

        <!-- BADGE -->
        <div class="mb-3">

          <span [ngStyle]="{
              'background': themeService.primarySoft,
              'border': '1px solid ' + themeService.primary,
              'color': themeService.Textprincipal
            }" class="
              inline-flex
              items-center
              gap-2

              px-3
              py-1.5

              rounded-full

              text-xs
              font-semibold
              tracking-wide

              backdrop-blur-md
            ">

            <span class="w-2 h-2 rounded-full bg-current animate-pulse"></span>

            Gestion des cookies

          </span>
        </div>

        <!-- TITLE -->
        <h2 id="cookie-title" class="
            text-xl
            sm:text-2xl
            font-black
            leading-tight
            mb-3
          ">

          Une expérience plus fluide sur l'application ASDAM

        </h2>

        <!-- DESCRIPTION -->
        <p id="cookie-desc" [ngStyle]="{
            'color': themeService.Textsecondaire
          }" class="
            text-sm
            sm:text-base
            leading-relaxed
            max-w-3xl
          ">

          Nous utilisons des cookies pour améliorer la sécurité,
          personnaliser votre expérience et optimiser les performances
          de la plateforme ASDAM.

        </p>

        <!-- LINK -->
        <a routerLink="/cookies" [ngStyle]="{
            'color': themeService.secondary
          }" class="
            inline-flex
            items-center
            gap-2

            mt-4

            text-sm
            font-semibold

            hover:gap-3
            transition-all
            duration-300

            group
          ">

          Politique de confidentialité

          <i class="fa-solid fa-arrow-right text-xs transition-transform duration-300 group-hover:translate-x-1"></i>

        </a>

      </div>
    </div>

    <!-- ====================================== -->
    <!-- ACTIONS -->
    <!-- ====================================== -->
    <div class="
        relative
        z-10
    
        flex
        flex-col
        sm:flex-row
    
        items-stretch
        sm:items-center
    
        gap-3
    
        w-full
        xl:w-auto
      ">

      <!-- ================================= -->
      <!-- ❌ REFUSE BUTTON -->
      <!-- ================================= -->

      <button type="button" (click)="refuse()" [ngStyle]="{
          'background': themeService.Background2,
          'border': '1px solid ' + themeService.Bordernormal,
          'color': themeService.Textprincipal
        }" class="
          relative
          overflow-hidden
    
          flex
          items-center
          justify-center
    
          w-full
          sm:w-auto
    
          min-w-[170px]
    
          px-6
          py-3.5
    
          rounded-2xl
    
          font-semibold
          text-sm
    
          backdrop-blur-xl
    
          transition-all
          duration-300
          ease-out
    
          hover:scale-[1.03]
          hover:-translate-y-0.5
    
          active:scale-95
    
          focus:outline-none
          focus:ring-2
          focus:ring-white/20
    
          group
        ">

        <!-- Hover Glow -->
        <div class="
            absolute
            inset-0
    
            opacity-0
            group-hover:opacity-100
    
            transition-opacity
            duration-300
          " [ngStyle]="{
            'background':
              'linear-gradient(135deg, transparent, rgba(255,255,255,0.06), transparent)'
          }">
        </div>

        <!-- Content -->
        <span class="
            relative
            z-10
    
            flex
            items-center
            justify-center
    
            gap-2
    
            w-full
    
            text-center
          ">

          <i class="
              fa-solid
              fa-xmark
    
              text-sm
    
              transition-transform
              duration-300
    
              group-hover:rotate-90
            ">
          </i>

          <span>
            Refuser
          </span>

        </span>

      </button>

      <!-- ================================= -->
      <!-- ✅ ACCEPT BUTTON -->
      <!-- ================================= -->

      <button type="button" (click)="accept()" [ngStyle]="{
          'background':
            'linear-gradient(135deg,' +
            themeService.primary + ',' +
            themeService.primary + ')',
    
          'color': '#FFFFFF'
        }" class="
          relative
          overflow-hidden
    
          flex
          items-center
          justify-center
    
          w-full
          sm:w-auto
    
          min-w-[190px]
    
          px-7
          py-3.5
    
          rounded-2xl
    
          font-bold
          text-sm
    
          transition-all
          duration-300
          ease-out
    
          hover:scale-[1.04]
          hover:-translate-y-1
    
          active:scale-95
    
          focus:outline-none
          focus:ring-2
          focus:ring-white/20
    
          group
        ">

        <!-- Animated Shine -->
        <div class="
            absolute
            inset-0
            opacity-0
            
            group-hover:opacity-100
    
            transition-all
            duration-500
          " style="
            background:
              linear-gradient(
                120deg,
                transparent 0%,
                rgba(255,255,255,0.28) 50%,
                transparent 100%
              );
    
            transform: translateX(-100%);
            animation: shine 2.4s infinite;
          ">
        </div>

        <!-- Glow Overlay -->
        <div class="
            absolute
            inset-0
    
            opacity-0
            group-hover:opacity-100
    
            transition-opacity
            duration-300
          " style="
            background:
              radial-gradient(
                circle at center,
                rgba(255,255,255,0.18),
                transparent 70%
              );
          ">
        </div>

        <!-- Content -->
        <span class="
            relative
            z-10
    
            flex
            items-center
            justify-center
    
            gap-2
    
            w-full
    
            text-center
          ">

          <i class="
              fa-solid
              fa-circle-check
    
              transition-transform
              duration-300
    
              group-hover:scale-110
            ">
          </i>

          <span>
            Accepter
          </span>

        </span>

      </button>

    </div>



  </div>
</div>

<!-- ========================================================= -->
<!-- 🔔 TOAST NOTIFICATION -->
<!-- ========================================================= -->

<div *ngIf="showNotification" class="
    fixed
    top-24
    right-4
    z-[999999]

    animate-toast
  ">

  <div [ngStyle]="{
      'background':
        'linear-gradient(135deg,' +
        themeService.convocationPrimary + ',' +
        themeService.c18Base + ')',

      'box-shadow':
        '0 15px 40px rgba(0,0,0,0.25)'
    }" class="
      relative
      overflow-hidden

      flex
      items-center
      gap-4

      min-w-[320px]
      max-w-[420px]

      px-5
      py-4

      rounded-2xl

      border
      border-white/10

      backdrop-blur-xl
    ">

    <!-- Glow -->
    <div class="
        absolute
        inset-0
        opacity-20
      " style="
        background:
        radial-gradient(circle at top right,
        rgba(255,255,255,0.5),
        transparent 60%);
      ">
    </div>

    <!-- ICON -->
    <div class="
        relative
        z-10

        w-12
        h-12

        rounded-2xl

        bg-white/20

        flex
        items-center
        justify-center

        backdrop-blur-md

        shadow-lg
      ">

      <i class="fa-solid fa-circle-check text-white text-xl animate-pop"></i>

    </div>

    <!-- TEXT -->
    <div class="relative z-10 flex-1 min-w-0">

      <p class="text-white font-black text-sm tracking-wide">
        Succès
      </p>

      <p class="text-white/90 text-sm truncate mt-0.5">
        {{ notificationMessage }}
      </p>

    </div>

    <!-- CLOSE -->
    <button type="button" (click)="closeNotification()" class="
        relative
        z-10

        w-8
        h-8

        rounded-full

        flex
        items-center
        justify-center

        hover:bg-white/20

        transition-all
        duration-300

        active:scale-90
      ">

      <i class="fa-solid fa-xmark text-white/80 hover:text-white"></i>

    </button>

  </div>
</div>

<!-- ========================================================= -->
<!-- 🎬 PREMIUM ANIMATIONS -->
<!-- ========================================================= -->

<style>
  /* ===================================== */
  /* COOKIE ANIMATION */
  /* ===================================== */

  @keyframes cookie-up {

    from {
      opacity: 0;
      transform: translateY(120px) scale(0.96);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* ===================================== */
  /* TOAST */
  /* ===================================== */

  @keyframes toast {

    0% {
      opacity: 0;
      transform: translateX(120%) scale(0.8);
    }

    60% {
      opacity: 1;
      transform: translateX(-10px) scale(1.02);
    }

    100% {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
  }

  /* ===================================== */
  /* POP ICON */
  /* ===================================== */

  @keyframes pop {

    0% {
      transform: scale(0) rotate(-180deg);
    }

    70% {
      transform: scale(1.2) rotate(10deg);
    }

    100% {
      transform: scale(1);
    }
  }

  /* ===================================== */
  /* SHINE */
  /* ===================================== */

  @keyframes shine {

    0% {
      transform: translateX(-120%);
    }

    100% {
      transform: translateX(120%);
    }
  }

  /* ===================================== */
  /* CLASSES */
  /* ===================================== */

  .animate-cookie-up {
    animation: cookie-up 0.65s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .animate-toast {
    animation: toast 0.55s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .animate-pop {
    animation: pop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
</style>
