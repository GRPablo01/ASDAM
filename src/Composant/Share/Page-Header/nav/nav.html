<!-- ========================================================= -->
<!-- NAVIGATION PREMIUM RESPONSIVE -->
<!-- ========================================================= -->

<app-icon></app-icon>

<!-- ========================================================= -->
<!-- 🖥️ DESKTOP + LAPTOP NAVBAR PREMIUM -->
<!-- ≥ 1024px -->
<!-- ========================================================= -->
<nav
  class="
    hidden
    lg:flex
    items-center
    justify-center
    w-full
    sticky
    top-0
    z-[100]
    transition-all
    duration-300
  "
>

  <!-- CONTAINER -->
  <div
    class="
      flex
      items-center
      justify-between
      w-full
      max-w-[1700px]
      px-6
      xl:px-10
      py-3
    "
  >

    <!-- ========================================================= -->
    <!-- LEFT MENU -->
    <!-- ========================================================= -->

    <div class="flex items-center">

      <ul class="flex items-center gap-2 xl:gap-3">

        <!-- ITEM -->
        <li
          *ngFor="let item of menu; let i = index"
          class="relative"
        >

          <a
            [routerLink]="item.link"

            class="
              relative
              flex
              items-center
              gap-2.5
              px-4
              xl:px-5
              py-3
              rounded-2xl
              overflow-hidden
              transition-all
              duration-300
              cursor-pointer
              group
              select-none
              hover:-translate-y-[2px]
            "

            (mouseenter)="hoveredMobileIndex = i; item.children ? openMenuIndex = i : null"
            (mouseleave)="hoveredMobileIndex = -1"

            [ngStyle]="{

              'background':
                hoveredMobileIndex === i
                  ? themeService.NavHover
                  : 'transparent',

              'border':
                '1px solid ' +
                (
                  hoveredMobileIndex === i
                    ? themeService.NavBorder
                    : 'transparent'
                ),

              'box-shadow':
                hoveredMobileIndex === i
                  ? '0 8px 24px rgba(15,23,42,0.08)'
                  : 'none'

            }"
          >

            <!-- ACTIVE INDICATOR -->
            <div
              class="
                absolute
                left-0
                top-1/2
                -translate-y-1/2
                h-[70%]
                w-[4px]
                rounded-r-full
                transition-all
                duration-300
              "

              [ngStyle]="{
                'background':
                  hoveredMobileIndex === i
                    ? themeService.NavActive
                    : 'transparent',

                'opacity':
                  hoveredMobileIndex === i
                    ? '1'
                    : '0'
              }"
            ></div>

            <!-- ICON -->
            <i
              *ngIf="item.icon"
              [class]="item.icon + ' relative z-10 text-[15px] transition-all duration-300'"

              [ngStyle]="{
                'color':
                  hoveredMobileIndex === i
                    ? themeService.NavActive
                    : themeService.NavTextesecondaire
              }"
            ></i>

            <!-- LABEL -->
            <span
              class="
                relative
                z-10
                text-[14px]
                xl:text-[15px]
                font-semibold
                tracking-[0.2px]
                transition-all
                duration-300
              "

              [ngStyle]="{
                'color':
                  hoveredMobileIndex === i
                    ? themeService.NavActive
                    : themeService.NavTextesecondaire
              }"
            >
              {{ item.label }}
            </span>

            <!-- BADGE -->
            <span
              *ngIf="item.badge"

              class="
                relative
                z-10
                px-2.5
                py-1
                rounded-full
                text-[10px]
                font-bold
                text-white
                shadow-lg
                animate-pulse
              "

              [ngStyle]="{
                'background':
                  'linear-gradient(135deg, ' +
                  themeService.NavActive +
                  ', #F87171)'
              }"
            >
              {{ item.badge }}
            </span>

            <!-- HOVER LIGHT -->
            <div
              class="
                absolute
                inset-0
                opacity-0
                group-hover:opacity-100
                transition-all
                duration-300
                pointer-events-none
              "

              [ngStyle]="{
                'background':
                  'linear-gradient(135deg, ' +
                  themeService.NavActive +
                  '08, transparent)'
              }"
            ></div>

          </a>

        </li>

      </ul>

    </div>

    <!-- ========================================================= -->
    <!-- RIGHT SLOT -->
    <!-- ========================================================= -->

    <div class="flex items-center gap-3">

      <div
        class="
          flex
          items-center
          gap-3
          pl-5
          border-l
        "

        [ngStyle]="{
          'border-color': themeService.NavBorder
        }"
      >

        <ng-content select="[nav-right]"></ng-content>

      </div>

    </div>

  </div>

</nav>

<!-- ========================================================= -->
<!-- 📱 TABLET + MOBILE NAVBAR PREMIUM -->
<!-- < 1024px -->
<!-- FIXED BOTTOM FULL WIDTH -->
<!-- ========================================================= -->
<nav
  class="
    flex
    lg:hidden

    fixed
    bottom-0
    left-0
    right-0

    w-full
    z-[9999]

    backdrop-blur-2xl
  "
>

  <!-- CONTAINER -->
  <div
    class="
      relative
      w-full

      px-2
      py-2.5

      border-t

      overflow-hidden
      transition-all
      duration-300
    "

    [ngStyle]="{
      'background': themeService.NavBackground + 'F2',
      'border-color': themeService.NavBorder,
      'box-shadow': '0 -10px 30px rgba(15,23,42,0.08)'
    }"
  >

    <!-- TOP LIGHT EFFECT -->
    <div
      class="
        absolute
        top-0
        left-0
        w-full
        h-[1px]
      "

      [ngStyle]="{
        'background':
          'linear-gradient(to right, transparent, ' +
          themeService.NavActive +
          ', transparent)'
      }"
    ></div>

    <!-- MENU -->
    <ul
      class="
        relative
        z-10

        flex
        items-center
        justify-between

        gap-1

        w-full
      "
    >

      <!-- ITEM -->
      <li
        *ngFor="let item of menu; let i = index"
        class="flex-1"
      >

        <a
          [routerLink]="item.link"

          class="
            relative

            flex
            flex-col
            items-center
            justify-center

            gap-1.5

            py-2.5
            px-2

            w-full

            rounded-2xl

            overflow-hidden

            transition-all
            duration-300

            active:scale-[0.97]
          "

          (mouseenter)="hoveredMobileIndex = i"
          (mouseleave)="hoveredMobileIndex = -1"

          [ngStyle]="{

            'background':
              hoveredMobileIndex === i
                ? themeService.NavHover
                : 'transparent',

            'border':
              '1px solid ' +
              (
                hoveredMobileIndex === i
                  ? themeService.NavBorder
                  : 'transparent'
              ),

            'box-shadow':
              hoveredMobileIndex === i
                ? '0 8px 20px rgba(15,23,42,0.08)'
                : 'none'

          }"
        >

          <!-- ACTIVE TOP BAR -->
          <div
            class="
              absolute
              top-0
              left-1/2
              -translate-x-1/2

              h-[3px]
              w-8

              rounded-b-full

              transition-all
              duration-300
            "

            [ngStyle]="{
              'background':
                hoveredMobileIndex === i
                  ? themeService.NavActive
                  : 'transparent',

              'opacity':
                hoveredMobileIndex === i
                  ? '1'
                  : '0'
            }"
          ></div>

          <!-- ICON -->
          <div
            class="
              relative
              flex
              items-center
              justify-center
              transition-all
              duration-300
            "

            [ngStyle]="{
              'transform':
                hoveredMobileIndex === i
                  ? 'translateY(-2px)'
                  : 'translateY(0)'
            }"
          >

            <i
              *ngIf="item.icon"

              [class]="item.icon + ' text-[19px] transition-all duration-300 relative z-10'"

              [ngStyle]="{
                'color':
                  hoveredMobileIndex === i
                    ? themeService.NavActive
                    : themeService.NavTextesecondaire
              }"
            ></i>

            <!-- ICON GLOW -->
            <div
              class="
                absolute
                w-8
                h-8
                rounded-full
                blur-xl
                opacity-0
                transition-all
                duration-300
              "

              [ngStyle]="{
                'background': themeService.NavActive,

                'opacity':
                  hoveredMobileIndex === i
                    ? '0.18'
                    : '0'
              }"
            ></div>

          </div>

          <!-- LABEL -->
          <span
            class="
              text-[10px]
              sm:text-[11px]

              font-semibold

              tracking-[0.2px]

              transition-all
              duration-300

              relative
              z-10
            "

            [ngStyle]="{
              'color':
                hoveredMobileIndex === i
                  ? themeService.NavActive
                  : themeService.NavTextesecondaire
            }"
          >
            {{ item.label }}
          </span>

          <!-- BADGE -->
          <span
            *ngIf="item.badge"

            class="
              absolute
              top-1.5
              right-3

              min-w-[18px]
              h-[18px]

              px-1

              flex
              items-center
              justify-center

              rounded-full

              text-[9px]
              font-bold
              text-white

              shadow-lg
            "

            [ngStyle]="{
              'background':
                'linear-gradient(135deg, ' +
                themeService.NavActive +
                ', #F87171)'
            }"
          >
            {{ item.badge }}
          </span>

          <!-- HOVER LIGHT -->
          <div
            class="
              absolute
              inset-0

              opacity-0

              transition-all
              duration-300

              pointer-events-none
            "

            [class.opacity-100]="hoveredMobileIndex === i"

            [ngStyle]="{
              'background':
                'radial-gradient(circle at top, ' +
                themeService.NavActive +
                '10, transparent 70%)'
            }"
          ></div>

        </a>

      </li>

    </ul>

  </div>

</nav>

<!-- ========================================================= -->
<!-- SPACER MOBILE/TABLET -->
<!-- ========================================================= -->

<div class="block lg:hidden h-20 w-full"></div>
