<!-- ========================================= -->
<!-- 📰 NEWS BUTTON -->
<!-- ========================================= -->

<button
  type="button"
  (click)="toggleNewsPanel()"
  (mouseenter)="hoverNews = true"
  (mouseleave)="hoverNews = false"

  class="
    w-10 h-10
    rounded-full
    flex items-center justify-center
    relative
    overflow-hidden
    transition-all duration-300
    hover:scale-110
    active:scale-95
    group
  "

  aria-label="News"

  [ngStyle]="{
    'background': themeService.IconBackground,
    'border': '1px solid ' + themeService.IconBorder,
    'backdrop-filter': 'blur(22px) saturate(180%)',
    '-webkit-backdrop-filter': 'blur(22px) saturate(180%)',
    'box-shadow': themeService.Bowshadowtest
  }"
>

  <!-- Glow -->
  <span
    class="absolute inset-0 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300"
    [ngStyle]="{
      'background': 'linear-gradient(135deg, transparent, ' + themeService.primary + '25)'
    }"
  ></span>

  <!-- Pulse -->
  <span
    class="absolute inset-0 rounded-full scale-0 group-hover:scale-100 transition-all duration-300 opacity-20"
    [ngStyle]="{ background: themeService.primarySoft }"
  ></span>

  <!-- Icon -->
  <i
    class="fa-solid fa-newspaper text-xl relative z-10 transition-colors duration-300"
    [ngStyle]="{
      color: hoverNews ? themeService.primary : themeService.Textprincipal
    }"
  ></i>
</button>

<!-- ========================================= -->
<!-- 🌑 OVERLAY -->
<!-- ========================================= -->

<div
  *ngIf="openNewsPanel"
  (click)="toggleNewsPanel()"
  class="fixed inset-0 z-[1900] backdrop-blur-sm transition"
  [ngStyle]="{ backgroundColor: themeService.c6Dark + '80' }"
></div>

<!-- ========================================= -->
<!-- 📰 PANEL -->
<!-- ========================================= -->

<div
  *ngIf="openNewsPanel"
  class="
    fixed z-[2147483647]
    flex flex-col overflow-hidden
    bottom-0 left-0 right-0
    h-[88vh] w-full
    sm:top-0 sm:right-0 sm:left-auto sm:w-[420px] sm:h-full
    rounded-t-3xl sm:rounded-none
    transition-all duration-300 ease-out
  "
  [ngStyle]="getPanelStyle()"
>

  <!-- HEADER -->
  <div class="flex items-center justify-between px-5 py-4"
       [ngStyle]="getHeaderStyle()">

    <div class="flex items-center gap-3">

      <div class="relative">
        <i class="fa-solid fa-newspaper text-xl"></i>

        <span
          *ngIf="newsList.length"
          class="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full animate-pulse"
          [ngStyle]="{ background: themeService.c10Base }"
        ></span>
      </div>

      <div>
        <h2 class="text-lg font-bold">Actualités</h2>
        <p class="text-xs opacity-90">{{ newsList.length }} article(s)</p>
      </div>

    </div>

    <button
      (click)="toggleNewsPanel()"
      class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"
    >
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>

  </div>

  <!-- CONTENT -->
  <div class="flex-1 overflow-y-auto"
       [ngStyle]="{ background: themeService.Backgroundprincipal }">

    <ng-container *ngIf="newsList.length > 0; else emptyState">

      <div class="p-4 space-y-4">

        <div
          *ngFor="let news of newsList"
          class="rounded-2xl overflow-hidden border transition hover:scale-[1.01]"
          [ngStyle]="getCardStyle()"
        >

          <!-- IMAGE -->
          <div
            *ngIf="news.imageUrl"
            class="w-full h-40 bg-cover bg-center"
            [ngStyle]="{ backgroundImage: 'url(' + news.imageUrl + ')' }"
          ></div>

          <!-- BODY -->
          <div class="p-4 cursor-pointer" (click)="toggleExpand(news.key)">

            <div class="flex items-center gap-2 mb-2">
              <div class="w-2 h-2 rounded-full"
                   [ngStyle]="{ background: themeService.primary }"></div>

              <h3 class="font-bold"
                  [ngStyle]="{ color: themeService.Textprincipal }">
                {{ news.titre }}
              </h3>
            </div>

            <p class="text-xs"
               [ngStyle]="{ color: themeService.Textsecondaire }">
              {{ news.auteur }} • {{ news.datePublication | date:'EEE d MMM HH:mm' }}
            </p>

            <!-- BADGES -->
            <div class="mt-3 flex gap-2 flex-wrap">

              <span class="px-2 py-1 rounded-full text-[10px] font-bold"
                    [ngStyle]="getBadgePrimary()">
                <i class="fa-solid fa-tag mr-1"></i>{{ news.categorie }}
              </span>

              <span class="px-2 py-1 rounded-full text-[10px] font-bold"
                    [ngStyle]="getBadgeSecondary()">
                <i class="fa-solid fa-calendar mr-1"></i>
                {{ news.datePublication | date:'dd/MM' }}
              </span>

            </div>

            <!-- CONTENT -->
            <div *ngIf="expandedNews[news.key]"
                 class="mt-3 pt-3 border-t text-sm leading-relaxed"
                 [ngStyle]="{ color: themeService.Textsecondaire, borderColor: themeService.c2Base + '1A' }">
              {{ news.contenu }}
            </div>

          </div>
        </div>
      </div>
    </ng-container>

    <!-- EMPTY -->
    <ng-template #emptyState>

      <div class="flex flex-col items-center justify-center h-full text-center p-8">

        <div class="w-24 h-24 rounded-full flex items-center justify-center mb-5"
             [ngStyle]="getEmptyIconStyle()">
          <i class="fa-solid fa-newspaper text-4xl text-white"></i>
        </div>

        <h3 class="text-lg font-bold"
            [ngStyle]="{ color: themeService.Textprincipal }">
          Aucune actualité
        </h3>

        <p class="text-sm max-w-xs"
           [ngStyle]="{ color: themeService.Textsecondaire }">
          Aucun article disponible pour le moment.
        </p>

      </div>

    </ng-template>
  </div>

  <!-- FOOTER -->
  <div *ngIf="newsList.length > 0"
       class="px-5 py-4 border-t"
       [ngStyle]="getFooterStyle()">

    <button
      class="w-full py-3 rounded-xl font-semibold text-white transition hover:scale-[1.02]"
      [ngStyle]="getPrimaryButtonStyle()"
      (click)="markAllNewsAsRead()"
    >
      <i class="fa-solid fa-check-double mr-2"></i>
      Marquer tout comme lu
    </button>

  </div>

</div>
