<!-- ========================================= -->
<!-- 🔔 BOUTON NOTIFICATIONS (PREMIUM UI/UX) -->
<!-- ========================================= -->
<button
  type="button"
  (click)="toggleCenter()"
  (mouseenter)="hoverNotif = true"
  (mouseleave)="hoverNotif = false"

  class="
    w-10 h-10
    rounded-full
    flex items-center justify-center
    relative
    overflow-hidden
    transition-all duration-300
    hover:scale-110
    active:scale-95
    group
  "

  aria-label="Notifications"

  [ngStyle]="{
    'background': themeService.IconBackground,
    'border': '1px solid ' + themeService.IconBorder,
    'backdrop-filter': 'blur(22px) saturate(180%)',
    '-webkit-backdrop-filter': 'blur(22px) saturate(180%)',
    'box-shadow': themeService.Bowshadowtest
  }"
>

  <!-- Glow -->
  <span
    class="absolute inset-0 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300"
    [ngStyle]="{
      'background': 'linear-gradient(135deg, transparent, ' + themeService.primary + '25)'
    }"
  ></span>

  <!-- Pulse -->
  <span
    class="absolute inset-0 rounded-full scale-0 group-hover:scale-100 transition-all duration-300 opacity-20"
    [ngStyle]="{ background: themeService.primarySoft }"
  ></span>

  <!-- Icon -->
  <i
    class="fa-solid fa-bell text-xl relative z-10 transition-colors duration-300"
    [ngStyle]="{
      color: hoverNotif ? themeService.primary : themeService.Textprincipal
    }"
  ></i>

</button>

<!-- ========================================= -->
<!-- 🌑 OVERLAY (SMOOTH) -->
<!-- ========================================= -->

<div
  *ngIf="openCenter"
  (click)="toggleCenter()"
  class="
    fixed inset-0
    z-[1900]
    backdrop-blur-sm
    transition-all duration-300
  "
  [ngStyle]="{
    'background-color': themeService.c6Dark + '80'
  }"
></div>

<!-- ========================================= -->
<!-- 🔔 PANEL NOTIFICATIONS -->
<!-- ========================================= -->

<div
  *ngIf="openCenter"
  role="dialog"

  class="
    fixed z-[2147483647]
    flex flex-col overflow-hidden
    bottom-0 left-0 right-0
    w-full h-[88vh]
    sm:top-0 sm:right-0 sm:left-auto
    sm:h-full sm:w-[420px]
    rounded-t-[2rem]
    sm:rounded-none
    transition-all duration-300 ease-out
  "

  [ngStyle]="{
    'background': themeService.Backgroundsecondairetest,
    'backdrop-filter': 'blur(20px) saturate(180%)',
    '-webkit-backdrop-filter': 'blur(20px) saturate(180%)',
    'box-shadow': '0 20px 60px ' + themeService.c16Dark + '40',
    'border': '1px solid ' + themeService.c2Base + '33'
  }"
>

  <!-- MOBILE HANDLE / HEADER -->
  <div
    class="flex items-center justify-between px-5 py-4"
    [ngStyle]="{
      'background': 'linear-gradient(135deg,' +
        themeService.c1Base +
        ',' +
        themeService.c1Base +
        ')',
      'color': '#fff'
    }"
  >

    <div class="flex items-center gap-3 min-w-0">

      <div class="relative">
        <i class="fa-solid fa-bell text-xl text-white"></i>

        <span
          *ngIf="convocations.length > 0"
          class="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full animate-pulse"
          [ngStyle]="{
            'background': themeService.c10Base,
            'box-shadow': '0 0 8px ' + themeService.c10Base
          }"
        ></span>
      </div>

      <div>
        <h2 class="text-lg font-bold">Notifications</h2>
        <p class="text-xs opacity-90">
          {{ convocations.length }} convocation(s)
        </p>
      </div>

    </div>

    <button
      (click)="toggleCenter()"
      class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition"
    >
      <i class="fa-solid fa-xmark text-xl text-white"></i>
    </button>

  </div>

  <!-- CONTENT -->
  <div
    class="flex-1 overflow-y-auto"
    [ngStyle]="{
      'background': themeService.Backgroundprincipal
    }"
  >

    <ng-container *ngIf="convocations.length > 0; else noConv">

      <div class="p-4 space-y-4">

        <div
          *ngFor="let conv of convocations"
          class="
            rounded-2xl
            overflow-hidden
            border
            transition-all duration-300
            hover:scale-[1.01]
          "
          [ngStyle]="{
            'background': themeService.c16Base,
            'border-color': themeService.c2Base + '1A',
            'border-left': '4px solid ' + getBorderColor(conv),
            'box-shadow': '0 4px 15px ' + themeService.c16Dark + '20'
          }"
        >

          <!-- HEADER CARD -->
          <div class="p-4 cursor-pointer" (click)="toggleExpand(conv.key)">

            <div class="flex items-center gap-2 mb-2">
              <div
                class="w-2 h-2 rounded-full"
                [ngStyle]="{
                  'background': getBorderColor(conv)
                }"
              ></div>
              <h3
                class="font-bold text-base"
                [ngStyle]="{ 'color': themeService.Textprincipal }"
              >
                {{ conv.match }}
              </h3>
            </div>

            <p
              class="text-xs mt-1"
              [ngStyle]="{ 'color': themeService.Textsecondaire }"
            >
              {{ conv.lieu }} • {{ conv.dateMatch | date:'EEE d MMM HH:mm' }}
            </p>

            <!-- STATUS BADGES -->
            <div class="mt-3 flex gap-2">
              <span
                class="px-2 py-1 rounded-full text-[10px] font-bold"
                [ngStyle]="{
                  'background': themeService.c9Base + '24',
                  'color': themeService.c9Base,
                  'border': '1px solid ' + themeService.c9Base + '40'
                }"
              >
                <i class="fa-solid fa-location-dot mr-1"></i>
                {{ conv.lieu }}
              </span>
              <span
                class="px-2 py-1 rounded-full text-[10px] font-bold"
                [ngStyle]="{
                  'background': themeService.c2Base + '24',
                  'color': themeService.c2Base,
                  'border': '1px solid ' + themeService.c2Base + '40'
                }"
              >
                <i class="fa-solid fa-calendar mr-1"></i>
                {{ conv.dateMatch | date:'dd/MM' }}
              </span>
            </div>

          </div>

        </div>

      </div>

    </ng-container>

    <!-- EMPTY STATE -->
    <ng-template #noConv>

      <div class="flex flex-col items-center justify-center h-full p-8 text-center">

        <div
          class="w-24 h-24 rounded-full flex items-center justify-center mb-5"
          [ngStyle]="{
            'background': 'linear-gradient(135deg, ' + themeService.c1Base + ', ' + themeService.c1Base + ')',
            'box-shadow': '0 0 30px ' + themeService.c1Base + '4D'
          }"
        >
          <i class="fa-solid fa-bell-slash text-4xl text-white"></i>
        </div>

        <h3 class="text-lg font-bold"
            [ngStyle]="{ 'color': themeService.Textprincipal }">
          Aucune notification
        </h3>

        <p class="text-sm max-w-xs"
           [ngStyle]="{ 'color': themeService.Textsecondaire }">
          Vous n'avez pas encore de notifications.
        </p>

        <!-- DECORATIVE DOTS -->
        <div class="mt-6 flex gap-2">
          <div class="w-2 h-2 rounded-full" [ngStyle]="{'background': themeService.c2Base}"></div>
          <div class="w-2 h-2 rounded-full" [ngStyle]="{'background': themeService.c2Base}"></div>
          <div class="w-2 h-2 rounded-full" [ngStyle]="{'background': themeService.c2Base}"></div>
          <div class="w-2 h-2 rounded-full" [ngStyle]="{'background': themeService.c2Base}"></div>
        </div>

      </div>

    </ng-template>

  </div>

  <!-- FOOTER -->
  <div
    *ngIf="convocations.length > 0"
    class="px-5 py-4 border-t"
    [ngStyle]="{
      'background': themeService.c16Base,
      'border-color': themeService.c2Base + '1A'
    }"
  >

    <button
      class="
        w-full py-3 rounded-xl
        font-semibold text-white
        transition-all duration-300
        hover:scale-[1.02]
      "
      [ngStyle]="{
        'background': 'linear-gradient(135deg, ' + themeService.c1Base + ', ' + themeService.c2Base + ')',
        'box-shadow': '0 4px 15px ' + themeService.c1Base + '4D'
      }"
      (click)="markAllAsRead()"
    >
      <span class="flex items-center justify-center gap-2">
        <i class="fa-solid fa-check-double"></i>
        Marquer tout comme lu
      </span>
    </button>

  </div>

</div>
