<!-- ====================================================== -->
<!-- PAGE CREATE TEAM - REFACTOR CLEAN LAYOUT -->
<!-- ====================================================== -->
<section class="relative h-auto flex flex-col overflow-hidden"
    [style.background]="themeService?.Backgroundprincipaltest">

    
    <!-- ====================================================== -->
    <!-- TOP SECTION (LEFT + RIGHT) -->
    <!-- ====================================================== -->

    <div class="relative z-10 flex flex-col xl:flex-row w-full">

        <!-- ====================================================== -->
        <!-- LEFT IMAGE -->
        <!-- ====================================================== -->

        <aside class="w-full xl:w-1/2 relative h-auto overflow-hidden">

            <img src="assets/ImageEquipe.png" class="absolute inset-0 w-full h-full object-cover scale-105" />

            <div class="absolute inset-0 bg-gradient-to-br from-black/80 via-black/60 to-transparent"></div>

            <div class="relative z-10 h-full flex flex-col justify-center px-10">

                <h1 class="text-white text-5xl font-black leading-tight">
                    Créez votre<br />
                    <span class="text-transparent bg-clip-text"
                        [style.background-image]="'linear-gradient(135deg,' + themeService?.primary + ',' + themeService?.primary + '80)'">
                        équipe
                    </span>
                </h1>

                <p class="text-white/60 mt-6 max-w-md">
                    Gérez vos équipes, logos et saisons dans une interface moderne et rapide.
                </p>

            </div>

        </aside>

        <!-- ====================================================== -->
        <!-- RIGHT FORM -->
        <!-- ====================================================== -->

        <main class="w-full xl:w-1/2 px-6 py-10 xl:px-16 flex items-center">

            <div class="w-full">

                <div class="mb-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

                    <!-- TEXTE À GAUCHE -->
                    <div>
                        <h1 class="text-4xl font-black" [style.color]="themeService?.Textprincipal">
                            Créer une équipe
                        </h1>

                        <p class="text-sm mt-2" [style.color]="themeService?.Textsecondaire">
                            Ajoutez une nouvelle équipe à votre système
                        </p>
                    </div>

                    <!-- BOUTON À DROITE -->
                    <div class="flex justify-start lg:justify-end">

                        <button (click)="goBack()"
                            class="group h-12 px-6 rounded-2xl font-bold transition-all duration-300 hover:scale-[1.02] flex items-center gap-2 border"
                            [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'border': '1px solid ' + themeService.Bordernormal,
        'color': themeService.Textsecondaire,
        'box-shadow': themeService.Bowshadowtest
      }">

                            <i
                                class="fa-solid fa-arrow-left transition-transform duration-300 group-hover:-translate-x-1"></i>

                            Retour

                        </button>

                    </div>

                </div>

                <!-- FORM -->
                <form [formGroup]="equipeForm" (ngSubmit)="createTeam()"
                    class="rounded-[28px] p-8 border backdrop-blur-2xl space-y-6"
                    [ngStyle]="{
                        'background': themeService.Backgroundsecondairetest,
                        'border': '1px solid ' + themeService.primary,
                        'color': themeService.Textsecondaire,
                        'box-shadow': themeService.Bowshadowtest
                    }">

                    <!-- NOM -->
                    <div>
                        <label class="text-[10px] uppercase tracking-[4px] font-black mb-3 block"
                            [ngStyle]="{'color':themeService.Textprincipal}">
                            Nom de l’équipe
                        </label>

                        <div class="flex items-center gap-3 h-14 px-5 rounded-2xl border"
                            [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'border': '1px solid ' + themeService.Bordernormal,
        'color': themeService.Textsecondaire,
        'box-shadow': themeService.Bowshadowtest
      }">

                            <i class="fa-solid fa-shield text-sm" [ngStyle]="{'color':themeService.primary}"></i>

                            <input formControlName="nom" placeholder="Ex: ASDAM"
                                class="w-full outline-none font-medium"
                                [ngStyle]="{'color':themeService.Textprincipal}" />
                        </div>
                    </div>

                    <!-- SAISON -->
                    <div>
                        <label class="text-[10px] uppercase tracking-[4px] font-black mb-3 block"
                            [style.color]="themeService?.Textsecondaire">
                            Année de création
                        </label>

                        <div class="flex items-center gap-3 h-14 px-5 rounded-2xl border"
                            [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'border': '1px solid ' + themeService.Bordernormal,
        'color': themeService.Textsecondaire,
        'box-shadow': themeService.Bowshadowtest
      }">

                            <i class="fa-solid fa-calendar text-sm" [style.color]="themeService?.primary"></i>

                            <input type="number" formControlName="saison" placeholder="2025"
                                class="w-full bg-transparent outline-none font-medium"
                                [ngStyle]="{'color':themeService.Textprincipal}" />
                        </div>
                    </div>

                    <!-- LOGO -->
                    <div>
                        <label class="text-[10px] uppercase tracking-[4px] font-black mb-3 block"
                            [style.color]="themeService?.Textsecondaire">
                            Logo
                        </label>

                        <div class="flex items-center gap-3 h-14 px-5 rounded-2xl border cursor-pointer"
                            [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'border': '1px solid ' + themeService.Bordernormal,
        'color': themeService.Textsecondaire,
        'box-shadow': themeService.Bowshadowtest
      }">

                            <i class="fa-solid fa-image text-sm" [style.color]="themeService?.primary"></i>

                            <input type="file" accept="image/*" (change)="onFileSelect($event)"
                                class="w-full bg-transparent text-sm" [ngStyle]="{'color':themeService.Textprincipal}" />
                        </div>
                    </div>

                    <!-- PREVIEW -->
                    <div *ngIf="preview" class="flex justify-center">
                        <div class="w-24 h-24 rounded-full overflow-hidden border-2"
                            [style.borderColor]="themeService?.primary">

                            <img [src]="preview" class="w-full h-full object-cover">
                        </div>
                    </div>

                    <!-- BUTTON -->
                    <button type="submit" [disabled]="loading"
                        class="w-full h-14 rounded-2xl font-black text-white transition-all duration-300 hover:scale-[1.02] disabled:opacity-40"
                        [style.background]="themeService?.primary">

                        <span *ngIf="!loading">Créer équipe</span>
                        <span *ngIf="loading">Création...</span>

                    </button>

                </form>

            </div>

        </main>

    </div>

    <!-- ====================================================== -->
    <!-- TEAMS LIST FULL WIDTH -->
    <!-- ====================================================== -->

    <div class="relative z-10 w-full px-6 xl:px-16 py-14">

        <h2 class="text-2xl font-black mb-8" [style.color]="themeService?.Textprincipal">
            Équipes existantes
        </h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

            <div *ngFor="let team of equipes"
                class="rounded-[24px] p-6 border text-center transition-all duration-300 hover:scale-[1.03]"
                [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'border': '1px solid ' + themeService.Bordernormal,
        'color': themeService.Textsecondaire,
        'box-shadow': themeService.Bowshadowtest
      }">

                <div class="w-24 h-24 mx-auto rounded-full overflow-hidden border-2 mb-4"
                    [style.borderColor]="themeService?.primary">

                    <img [src]="'http://localhost:3000/uploads/equipe/' + team.logo" class="w-full h-full object-cover">
                </div>

                <h3 class="font-black text-lg" [style.color]="themeService?.Textprincipal">
                    {{ team.nom }}
                </h3>

                <p class="text-sm mt-1" [style.color]="themeService?.Textsecondaire">
                    {{ team.anneeCreation }}
                </p>

            </div>

        </div>

    </div>

</section>


<!-- ====================================================== -->
<!-- TOAST NOTIFICATION -->
<!-- ====================================================== -->

<div *ngIf="showNotification" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999999] animate-toast">

    <div [ngStyle]="{
        'background':
          'linear-gradient(135deg,' +
          themeService.c18Base +
          ',' +
          themeService.c18Base +
          ')'
      }"
        class="relative flex items-center gap-4 px-5 py-3 rounded-2xl text-white shadow-2xl backdrop-blur-xl border border-white/10 min-w-[280px] max-w-[90vw]">

        <!-- ICON -->
        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/15 flex-shrink-0">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <!-- TEXT -->
        <div class="flex-1 min-w-0">
            <p class="font-black text-xs tracking-wide">Notification</p>
            <p class="text-xs opacity-90 truncate">
                {{ notificationMessage }}
            </p>
        </div>

        <!-- CLOSE -->
        <button (click)="closeNotification()"
            class="w-7 h-7 rounded-full hover:bg-white/10 transition-all duration-300 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-xmark text-xs"></i>
        </button>

        <!-- SHINE -->
        <div class="absolute inset-0 rounded-2xl overflow-hidden pointer-events-none">
            <div
                class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-shine">
            </div>
        </div>

    </div>

</div>


<style>
    @keyframes toastIn {

        0% {
            opacity: 0;
            transform: translate(-50%, -20px) scale(0.95);
        }

        100% {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }

    }

    .animate-toast {
        animation: toastIn 0.4s ease;
    }

    @keyframes shine {

        100% {
            transform: translateX(200%);
        }

    }

    .animate-shine {
        animation: shine 3s infinite;
    }
</style>
