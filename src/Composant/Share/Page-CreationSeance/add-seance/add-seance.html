<app-icon></app-icon>

<!-- ====================================================== -->
<!-- PAGE CREATE SEANCE RESPONSIVE PREMIUM -->
<!-- ====================================================== -->

<section class="relative w-full min-h-screen overflow-hidden flex flex-col lg:flex-row"
    [ngStyle]="{ 'background': themeService.Backgroundprincipaltest }">


    <!-- ====================================================== -->
    <!-- BACKGROUND -->
    <!-- ====================================================== -->

    <div class="absolute inset-0 opacity-20 pointer-events-none" style="
  background:
  radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 35%),
  radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 30%);
">
    </div>




    <!-- ====================================================== -->
    <!-- LEFT SIDE -->
    <!-- ====================================================== -->
    <div class="relative w-full lg:w-[42%] min-h-[420px] lg:min-h-screen overflow-hidden flex-shrink-0">


        <img src="assets/ImageEntrainement.png" alt="Entrainement"
            class="absolute inset-0 w-full h-full object-cover transition-transform duration-[12s] hover:scale-110" />



        <div class="absolute inset-0" [ngStyle]="{
'background':
'linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0.85))'
}">
        </div>




        <div class="relative z-10 flex flex-col justify-between h-full
px-6 py-8
sm:px-10 sm:py-10
lg:px-14 lg:py-14">



            <!-- LOGO -->

            <div class="flex items-center justify-center lg:justify-start gap-4 animate-fade-in-down">


                <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-3xl flex items-center justify-center backdrop-blur-xl border shadow-2xl"
                    [ngStyle]="{
'background':'rgba(255,255,255,0.10)',
'border-color':'rgba(255,255,255,0.18)'
}">
                    <i class="fa-solid fa-dumbbell text-white text-xl sm:text-2xl"></i>
                </div>


                <div class="text-center lg:text-left">

                    <h1 class="text-2xl sm:text-3xl font-black tracking-wide text-white">
                        ASDAM
                    </h1>

                    <p class="text-[10px] sm:text-[11px] uppercase tracking-[4px] text-white/60">
                        Gestion des entraînements
                    </p>

                </div>

            </div>





            <!-- TEXTE -->

            <div class="max-w-[480px] mx-auto lg:mx-0 text-center lg:text-left animate-fade-in-up">


                <h2 class="text-4xl sm:text-5xl lg:text-6xl leading-[1.05] font-black text-white mb-5">

                    Créer<br>
                    une séance

                </h2>



                <p class="text-white/70 text-sm sm:text-[15px] lg:text-base leading-relaxed">

                    Organisez vos entraînements,
                    planifiez vos séances et gérez vos équipes
                    avec une interface moderne.

                </p>



                <div class="flex items-center justify-center lg:justify-start gap-3 mt-8">

                    <div class="w-12 h-2 rounded-full bg-white"></div>
                    <div class="w-2 h-2 rounded-full bg-white/40"></div>
                    <div class="w-2 h-2 rounded-full bg-white/40"></div>

                </div>


            </div>



        </div>


    </div>

    
    <!-- ====================================================== -->
    <!-- RIGHT SIDE -->
    <!-- ====================================================== -->

    <div class="
        relative w-full lg:w-[58%]
        flex items-center justify-center
        px-4 py-8
        sm:px-8 sm:py-10
        lg:px-16 lg:py-12
        ">


        <div class="w-full max-w-5xl">



            <!-- HEADER -->

            <div class="mb-8 sm:mb-10">


                <div class="
                flex flex-col sm:flex-row
                sm:items-start
                sm:justify-between
                gap-6
                ">


                    <div class="flex-1 text-center lg:text-left">


                        <div class="flex items-center justify-center lg:justify-start gap-4 mb-3">


                            <div class="w-1.5 h-8 sm:h-10 rounded-full" [ngStyle]="{
                                'background':themeService.primary
                                }">
                            </div>



                            <h2 class="text-3xl sm:text-4xl font-black" [ngStyle]="{
                            'color':themeService.Textprincipal
                            }">
                                Nouvelle séance
                            </h2>


                        </div>


                        <p class="text-sm sm:text-base lg:ml-6" [ngStyle]="{
                            'color':themeService.Textsecondaire
                            }">
                            Planifiez un nouvel entraînement pour votre équipe
                        </p>



                    </div>






                    <button (click)="goBack()" class="
                    h-12 px-5 rounded-2xl font-bold
                    transition-all duration-300
                    hover:scale-105
                    flex items-center gap-2
                    " [ngStyle]="{
                    'background':themeService.Backgroundsecondairetest,
                    'border':'1px solid '+themeService.Bordernormal,
                    'color':themeService.Textsecondaire,
                    'box-shadow':themeService.Bowshadowtest
                    }">


                        <i class="fa-solid fa-arrow-left"></i>

                        Retour


                    </button>



                </div>


            </div>






            <!-- ====================================================== -->
            <!-- FORM -->
            <!-- ====================================================== -->


            <form class="space-y-6">



                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">




                    <!-- TITRE -->

                    <div>

                        <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                            [ngStyle]="{'color':themeService.Textsecondaire}">
                            Titre
                        </label>


                        <div class="flex items-center h-16 rounded-3xl px-6 gap-4" [ngStyle]="{
'background':themeService.Backgroundsecondairetest,
'border':'1px solid '+themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                            <i class="fa-solid fa-heading" [ngStyle]="{'color':themeService.primary}">
                            </i>


                            <input type="text" [(ngModel)]="titre" name="titre" placeholder="Ex: Entraînement U18"
                                class="w-full h-full bg-transparent" [ngStyle]="{
'color':themeService.Textprincipal
}">


                        </div>


                    </div>


                    <!-- EQUIPE -->
                    <div>


                        <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                            [ngStyle]="{'color':themeService.Textsecondaire}">
                            Equipe concernée
                        </label>



                        <div class="flex items-center h-16 rounded-3xl px-6 gap-4" [ngStyle]="{
'background':themeService.Backgroundsecondairetest,
'border':'1px solid '+themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                            <i class="fa-solid fa-users" [ngStyle]="{'color':themeService.primary}">
                            </i>


                            <select [(ngModel)]="equipe" name="equipe" class="w-full bg-transparent outline-none"
                                [ngStyle]="{
'color':themeService.Textprincipal
}">


                                <option *ngFor="let eq of equipes" [value]="eq">
                                    {{eq}}
                                </option>


                            </select>


                        </div>


                    </div>


                    <!-- DATE -->
                    <div>


                        <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                            [ngStyle]="{'color':themeService.Textsecondaire}">
                            Date
                        </label>



                        <div class="flex items-center h-16 rounded-3xl px-6 gap-4" [ngStyle]="{
'background':themeService.Backgroundsecondairetest,
'border':'1px solid '+themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                            <i class="fa-solid fa-calendar" [ngStyle]="{'color':themeService.primary}">
                            </i>



                            <input type="date" [(ngModel)]="date" name="date" class="bg-transparent outline-none w-full"
                                [ngStyle]="{
'color':themeService.Textprincipal
}">


                        </div>


                    </div>


                    <!-- HEURE -->
                    <div>


                        <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                            [ngStyle]="{'color':themeService.Textsecondaire}">
                            Heure
                        </label>



                        <div class="flex items-center h-16 rounded-3xl px-6 gap-4"[ngStyle]="{
                            'background':themeService.Backgroundsecondairetest,
                            'border':'1px solid '+themeService.primary,
                            'box-shadow':themeService.Bowshadowtest
                            }">


                            <i class="fa-solid fa-clock" [ngStyle]="{'color':themeService.primary}">
                            </i>



                            <input type="time" [(ngModel)]="heure" name="heure"
                                class="bg-transparent outline-none w-full" [ngStyle]="{
                            'color':themeService.Textprincipal
                            }">


                        </div>


                    </div>

                </div>

                <!-- DESCRIPTION -->
                <div>


                    <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                        [ngStyle]="{'color':themeService.Textsecondaire}">
                        Description
                    </label>



                    <div class="flex items-start rounded-3xl px-6 py-5 gap-4" [ngStyle]="{
'background':themeService.Backgroundsecondairetest,
'border':'1px solid '+themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                        <i class="fa-solid fa-align-left mt-1" [ngStyle]="{'color':themeService.primary}">
                        </i>



                        <textarea rows="6" [(ngModel)]="description" name="description"
                            placeholder="Description de la séance..."
                            class="w-full bg-transparent outline-none resize-none" [ngStyle]="{
'color':themeService.Textprincipal
}"></textarea>


                    </div>


                </div>


                <!-- LIEU -->
                <div>


                    <label class="block mb-2 ml-2 text-[11px] uppercase font-bold tracking-[3px]"
                        [ngStyle]="{'color':themeService.Textsecondaire}">
                        Lieu
                    </label>



                    <div class="flex items-center h-16 rounded-3xl px-6 gap-4" [ngStyle]="{
'background':themeService.Backgroundsecondairetest,
'border':'1px solid '+themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                        <i class="fa-solid fa-location-dot" [ngStyle]="{'color':themeService.primary}">
                        </i>



                        <input type="text" [(ngModel)]="lieu" name="lieu" placeholder="Stade Municipal"
                            class="w-full bg-transparent outline-none" [ngStyle]="{
'color':themeService.Textprincipal
}">


                    </div>


                </div>


                <!-- BUTTON -->
                <button type="button" (click)="createSeance()" [disabled]="loading" class="
relative
w-full
h-16
rounded-3xl
font-black
overflow-hidden
group
transition-all
duration-300
hover:scale-[1.01]
" [ngStyle]="{
'background':themeService.primary,
'box-shadow':themeService.Bowshadowtest
}">


                    <div class="
absolute inset-0 opacity-0
group-hover:opacity-100
transition-opacity
duration-500
">


                        <div class="
absolute inset-0
bg-gradient-to-r
from-transparent
via-white/20
to-transparent
-translate-x-full
group-hover:translate-x-full
transition-transform
duration-1000
">
                        </div>


                    </div>



                    <span class="relative z-10 flex items-center justify-center gap-3 text-white">

                        <i class="fa-solid fa-calendar-plus"></i>

                        {{loading ? 'Création...' : 'Créer la séance'}}

                    </span>


                </button>



            </form>


        </div>


    </div>


</section>


<!-- ====================================================== -->
<!-- TOAST NOTIFICATION -->
<!-- ====================================================== -->
<div *ngIf="showNotification" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999999] animate-toast">

    <div [ngStyle]="{
        'background':
          'linear-gradient(135deg,' +
          themeService.c18Base +
          ',' +
          themeService.c18Base +
          ')'
      }"
        class="relative flex items-center gap-4 px-5 py-3 rounded-2xl text-white shadow-2xl backdrop-blur-xl border border-white/10 min-w-[280px] max-w-[90vw]">

        <!-- ICON -->
        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/15 flex-shrink-0">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <!-- TEXT -->
        <div class="flex-1 min-w-0">
            <p class="font-black text-xs tracking-wide">Notification</p>
            <p class="text-xs opacity-90 truncate">
                {{ notificationMessage }}
            </p>
        </div>

        <!-- CLOSE -->
        <button (click)="closeNotification()"
            class="w-7 h-7 rounded-full hover:bg-white/10 transition-all duration-300 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-xmark text-xs"></i>
        </button>

        <!-- SHINE -->
        <div class="absolute inset-0 rounded-2xl overflow-hidden pointer-events-none">
            <div
                class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-shine">
            </div>
        </div>

    </div>

</div>
