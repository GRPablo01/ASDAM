<section class="py-10 px-10" [ngStyle]="{ 'background': themeService.Backgroundprincipaltest }">

  <!-- ===================================================== -->
  <!-- HEADER - CENTRE DE L'EQUIPE -->
  <!-- ===================================================== -->
  <div class="relative overflow-hidden rounded-3xl px-5 py-5 md:px-7 md:py-6 shadow-xl backdrop-blur-xl border"
    [ngStyle]="{
    'background': themeService.Backgroundsecondairetest,
    'border': '1px solid ' + themeService.Bordernormal,
    'color': themeService.Textsecondaire,
    'box-shadow': themeService.Bowshadowtest
  }">

    <div class="relative z-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">

      <!-- LEFT -->
      <div class="flex items-center gap-4">

        <!-- ICON -->
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg border" [ngStyle]="{
    'background': themeService.primary,
    'border': '1px solid ' + themeService.Bordernormal,
    'color': themeService.Textsecondaire,
    'box-shadow': themeService.Bowshadowtest
  }">
          <i class="fa-solid fa-users text-xl text-white"></i>
        </div>

        <!-- TEXT -->
        <div>

          <h1 class="text-2xl md:text-3xl font-black tracking-tight"
            [ngStyle]="{ 'color': themeService.Textprincipal }">
            Centre de l'Équipe
          </h1>

          <p class="mt-3 text-sm md:text-lg leading-relaxed max-w-2xl"
            [ngStyle]="{ 'color': themeService.Textsecondaire }">
            Gérez vos joueurs, consultez leurs profils et suivez la composition de votre équipe en temps réel.
          </p>

        </div>

      </div>

    </div>

  </div>


  <!-- ================================================= -->
  <!-- PLAYERS GRID -->
  <!-- ================================================= -->
  <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <div *ngFor="let joueur of filteredJoueurs; let i = index" class="
        relative overflow-hidden
        rounded-3xl
        w-full max-w-[360px] mx-auto
        min-h-[480px]

        backdrop-blur-2xl
        transition-all duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)]
        hover:scale-[1.02] hover:-translate-y-1
        group flex flex-col cursor-pointer
      " [ngStyle]="{
        'background': themeService.Backgroundsecondairetest,
        'color': themeService.Textsecondaire,
        'border': '3px solid ' + getStatutColor(joueur),
        'box-shadow': getCardShadow(joueur)
      }">

      <!-- GLOW -->
      <div class="absolute top-0 left-0 w-full h-24 opacity-70 blur-3xl pointer-events-none"
        [style.background]="'linear-gradient(90deg,' + themeService.c16Dark + '55, transparent)'"></div>

      <!-- OVERLAY -->
      <div
        class="absolute inset-0 opacity-[0.04] bg-[radial-gradient(circle_at_top_right,_white_0,_transparent_45%)] pointer-events-none">
      </div>

      <!-- INITIALS BACKGROUND -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="
            text-[160px] sm:text-[200px] md:text-[240px]
            font-black uppercase select-none
            opacity-10 leading-none tracking-tight
            drop-shadow-2xl
          " [style.color]="themeService.Textsecondaire">
          {{ getInitiales(joueur) }}
        </div>
      </div>

      <!-- CONTENT -->
      <div class="relative z-10 flex flex-col flex-1 p-6">

        <!-- TOP -->
        <div class="flex items-start justify-between gap-3">

          <div class="flex flex-col">

            <div class="text-xs opacity-70 uppercase tracking-widest">
              Joueur #{{ i + 1 }}
            </div>

            <div class="text-lg font-bold leading-tight mt-1">
              {{ joueur.prenom }} {{ joueur.nom }}
            </div>

          </div>

          <div class="px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap" [ngStyle]="{
              'background': getStatutColor(joueur) + '20',
              'color': getStatutColor(joueur)
            }">
            {{ joueur.statutSportif }}
          </div>

        </div>

        <div class="flex-1"></div>

        <!-- BUTTON -->
        <button class="
            w-full py-3 rounded-2xl font-bold text-sm
            transition-all duration-300
            hover:scale-[1.03] active:scale-95
          " [ngStyle]="{
            'background': themeService.Backgroundsecondairetest,
            'border': '1px solid ' + themeService.Bordernormal,
            'color': themeService.Textsecondaire,
            'box-shadow': themeService.Bowshadowtest
          }" (click)="voirProfil(joueur)">
          Voir profil
        </button>

      </div>

    </div>

  </div>

</section>
