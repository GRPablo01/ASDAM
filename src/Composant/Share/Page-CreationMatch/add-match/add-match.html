<!-- ====================================================== -->
<!-- CREATE MATCH PAGE -->
<!-- ====================================================== -->
<section class="relative h-auto overflow-hidden" [style.background]="themeService?.Backgroundprincipaltest">



  <!-- ====================================================== -->
  <!-- CONTENT -->
  <!-- ====================================================== -->

  <div class="relative z-10 flex flex-col xl:flex-row h-auto">

    <!-- ====================================================== -->
    <!-- LEFT SIDE -->
    <!-- ====================================================== -->

    <aside class="w-full xl:w-1/2 relative overflow-hidden">

      <img src="assets/ImageMatch.png" class="absolute inset-0 w-full h-full object-cover scale-105" />

      <div class="absolute inset-0 bg-gradient-to-br
        from-black/90 via-black/70 to-transparent">
      </div>

      <div class="relative z-10 h-full flex flex-col justify-center px-10 py-20">

        <h1 class="text-white text-5xl font-black leading-tight">

          Organisez vos<br />

          <span class="text-transparent bg-clip-text" [style.background-image]="
              'linear-gradient(135deg,' +
              themeService?.primary +
              ',' +
              themeService?.primary +
              '80)'
            ">

            matchs

          </span>

        </h1>

        <p class="text-white/60 mt-6 max-w-lg text-lg leading-relaxed">

          Planifiez les rencontres,
          gérez les catégories,
          les horaires et les stades
          dans une interface moderne et professionnelle.

        </p>

      </div>

    </aside>

    <!-- ====================================================== -->
    <!-- RIGHT SIDE -->
    <!-- ====================================================== -->

    <main class="w-full xl:w-1/2 px-6 py-10 xl:px-16 flex items-center">

      <div class="w-full">

        <!-- TOP -->

        <div class="flex flex-col lg:flex-row
          lg:items-center lg:justify-between
          gap-6 mb-10">

          <div>

            <h1 class="text-4xl font-black" [style.color]="themeService?.Textprincipal">

              Création d'un match

            </h1>

            <p class="mt-2 text-sm" [style.color]="themeService?.Textsecondaire">

              Ajouter une rencontre au calendrier

            </p>

          </div>

          <!-- BTN -->

          <a routerLink="/dashboard"><button type="button" class="group h-12 px-6 rounded-2xl
            flex items-center gap-3
            border transition-all duration-300
            hover:scale-[1.02]" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

              <i class="fa-solid fa-arrow-left
              transition-all duration-300
              group-hover:-translate-x-1">
              </i>

              Retour

            </button></a>

        </div>

        <!-- ====================================================== -->
        <!-- FORM -->
        <!-- ====================================================== -->

        <form [formGroup]="matchForm" (ngSubmit)="createMatch()" class="rounded-[30px]
          p-8 border backdrop-blur-2xl
          space-y-6" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
          }">

          <!-- ====================================================== -->
          <!-- EQUIPES -->
          <!-- ====================================================== -->

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- DOMICILE -->

            <div>

              <label class="text-[10px] uppercase tracking-[4px]
                font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Équipe domicile

              </label>

              <div class="h-14 px-5 rounded-2xl border
                flex items-center gap-3" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

                <i class="fa-solid fa-house" [style.color]="themeService?.primary">
                </i>

                <input type="text" formControlName="equipeDomicile" placeholder="ASDAM"
                  class="w-full bg-transparent outline-none" [style.color]="themeService?.Textprincipal">

              </div>

            </div>

            <!-- EXTERIEUR -->

            <div>

              <label class="text-[10px] uppercase tracking-[4px]
                font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Équipe extérieur

              </label>

              <div class="h-14 px-5 rounded-2xl border
                flex items-center gap-3" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

                <i class="fa-solid fa-plane" [style.color]="themeService?.primary">
                </i>

                <input type="text" formControlName="equipeExterieur" placeholder="FC Belfort"
                  class="w-full bg-transparent outline-none" [style.color]="themeService?.Textprincipal">

              </div>

            </div>

          </div>

          <!-- ====================================================== -->
          <!-- TYPE + CATEGORIE -->
          <!-- ====================================================== -->

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- TYPE -->

            <div>

              <label class="text-[10px] uppercase tracking-[4px]
                font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Type de match

              </label>

              <div class="h-14 px-5 rounded-2xl border
                flex items-center gap-3" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

                <i class="fa-solid fa-trophy" [style.color]="themeService?.primary">
                </i>

                <select formControlName="typeMatch" class="w-full bg-transparent outline-none"
                  [style.color]="themeService?.Textprincipal">

                  <option *ngFor="let type of typesMatch" [value]="type">

                    {{ type }}

                  </option>

                </select>

              </div>

            </div>

            <!-- CATEGORIE -->

            <div>

              <label class="text-[10px] uppercase tracking-[4px]
                font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Catégorie

              </label>

              <div class="h-14 px-5 rounded-2xl border
                flex items-center gap-3" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

                <i class="fa-solid fa-layer-group" [style.color]="themeService?.primary">
                </i>

                <select formControlName="categorie" class="w-full bg-transparent outline-none"
                  [style.color]="themeService?.Textprincipal">

                  <option *ngFor="let cat of categories" [value]="cat">

                    {{ cat }}

                  </option>

                </select>

              </div>

            </div>

          </div>

          <!-- ====================================================== -->
          <!-- DATE + HEURE -->
          <!-- ====================================================== -->

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- DATE -->
            <div>

              <label class="text-[10px] uppercase tracking-[4px]
    font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Date du match

              </label>

              <div class="relative h-14 px-5 rounded-2xl border
    flex items-center gap-3" [ngStyle]="{
      'background': themeService.Backgroundsecondairetest,
      'border': '1px solid ' + themeService.Bordernormal,
      'color': themeService.Textsecondaire,
      'box-shadow': themeService.Bowshadowtest
    }">

                <!-- ICON -->
                <i class="fa-solid fa-calendar" [style.color]="themeService?.primary">
                </i>

                <!-- INPUT -->
                <input #dateMatchInput type="date" formControlName="dateMatch" class="
        w-full
        bg-transparent
        outline-none

        [&::-webkit-calendar-picker-indicator]:opacity-0
        [&::-webkit-calendar-picker-indicator]:absolute
        [&::-webkit-calendar-picker-indicator]:right-0
        [&::-webkit-calendar-picker-indicator]:w-full
        [&::-webkit-calendar-picker-indicator]:h-full
        [&::-webkit-calendar-picker-indicator]:cursor-pointer
      " [style.color]="themeService?.Textprincipal">

                <!-- CUSTOM BUTTON -->
                <button type="button" (click)="dateMatchInput.showPicker()" class="
        absolute right-5
        w-7 h-7
        rounded-full
        flex items-center justify-center
        transition-all duration-300
        hover:scale-110
      ">
                  <i class="fa-solid fa-calendar text-[11px]" [ngStyle]="{
          'color': themeService.Textprincipal
        }"></i>
                </button>

              </div>

            </div>

            <!-- HEURE -->
            <div>

              <label class="text-[10px] uppercase tracking-[4px]
    font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

                Heure du match

              </label>

              <div class="relative h-14 px-5 rounded-2xl border
    flex items-center gap-3" [ngStyle]="{
      'background': themeService.Backgroundsecondairetest,
      'border': '1px solid ' + themeService.Bordernormal,
      'color': themeService.Textsecondaire,
      'box-shadow': themeService.Bowshadowtest
    }">

                <!-- ICON -->
                <i class="fa-solid fa-clock" [style.color]="themeService?.primary">
                </i>

                <!-- INPUT -->
                <input #heureMatchInput type="time" formControlName="heureMatch" class="
        w-full
        bg-transparent
        outline-none

        [&::-webkit-calendar-picker-indicator]:opacity-0
        [&::-webkit-calendar-picker-indicator]:absolute
        [&::-webkit-calendar-picker-indicator]:right-0
        [&::-webkit-calendar-picker-indicator]:w-full
        [&::-webkit-calendar-picker-indicator]:h-full
        [&::-webkit-calendar-picker-indicator]:cursor-pointer
      " [style.color]="themeService?.Textprincipal">

                <!-- CUSTOM BUTTON -->
                <button type="button" (click)="heureMatchInput.showPicker()" class="
        absolute right-5
        w-7 h-7
        rounded-full
        flex items-center justify-center
        transition-all duration-300
        hover:scale-110
      ">
                  <i class="fa-solid fa-clock text-[11px]" [ngStyle]="{
          'color': themeService.Textprincipal
        }"></i>
                </button>

              </div>

            </div>
          </div>

          <!-- ====================================================== -->
          <!-- STADE -->
          <!-- ====================================================== -->
          <div>

            <label class="text-[10px] uppercase tracking-[4px]
              font-black mb-3 block" [style.color]="themeService?.Textsecondaire">

              Stade

            </label>

            <div class="h-14 px-5 rounded-2xl border
              flex items-center gap-3" [ngStyle]="{
              'background': themeService.Backgroundsecondairetest,
              'border': '1px solid ' + themeService.Bordernormal,
              'color': themeService.Textsecondaire,
              'box-shadow': themeService.Bowshadowtest
            }">

              <i class="fa-solid fa-location-dot" [style.color]="themeService?.primary">
              </i>

              <input type="text" formControlName="stade" placeholder="Stade Roger Serzian"
                class="w-full bg-transparent outline-none" [style.color]="themeService?.Textprincipal">

            </div>

          </div>

          <!-- ====================================================== -->
          <!-- ERROR -->
          <!-- ====================================================== -->

          <div *ngIf="errorMessage" class="rounded-2xl border px-5 py-4
            text-sm font-medium" style="
              background: rgba(239,68,68,0.12);
              border-color: rgba(239,68,68,0.2);
              color: #FCA5A5;
            ">

            {{ errorMessage }}

          </div>

          <!-- ====================================================== -->
          <!-- BUTTON -->
          <!-- ====================================================== -->

          <button type="submit" [disabled]="loading" class="w-full h-14 rounded-2xl
            text-white font-black
            transition-all duration-300
            hover:scale-[1.02]
            disabled:opacity-40" [style.background]="themeService?.primary">

            <span *ngIf="!loading">

              Créer le match

            </span>

            <span *ngIf="loading">

              Création...

            </span>

          </button>

        </form>

      </div>

    </main>

  </div>

</section>


<!-- ====================================================== -->
<!-- TOAST NOTIFICATION -->
<!-- ====================================================== -->

<div *ngIf="showNotification" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999999] animate-toast">

  <div [ngStyle]="{
        'background':
          'linear-gradient(135deg,' +
          themeService.c18Base +
          ',' +
          themeService.c18Base +
          ')'
      }"
    class="relative flex items-center gap-4 px-5 py-3 rounded-2xl text-white shadow-2xl backdrop-blur-xl border border-white/10 min-w-[280px] max-w-[90vw]">

    <!-- ICON -->
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/15 flex-shrink-0">
      <i class="fa-solid fa-circle-check"></i>
    </div>

    <!-- TEXT -->
    <div class="flex-1 min-w-0">
      <p class="font-black text-xs tracking-wide">Notification</p>
      <p class="text-xs opacity-90 truncate">
        {{ notificationMessage }}
      </p>
    </div>

    <!-- CLOSE -->
    <button (click)="closeNotification()"
      class="w-7 h-7 rounded-full hover:bg-white/10 transition-all duration-300 flex items-center justify-center flex-shrink-0">
      <i class="fa-solid fa-xmark text-xs"></i>
    </button>

    <!-- SHINE -->
    <div class="absolute inset-0 rounded-2xl overflow-hidden pointer-events-none">
      <div
        class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-shine">
      </div>
    </div>

  </div>

</div>
